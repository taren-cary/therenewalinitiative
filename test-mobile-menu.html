<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Menu Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { font-family: Arial, sans-serif; }
        
        .nav {
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1B263B;
        }
        
        .nav-menu {
            display: flex;
            gap: 2rem;
            list-style: none;
        }
        
        .nav-link {
            text-decoration: none;
            color: #1B263B;
        }
        
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
        }
        
        .hamburger-line {
            width: 28px;
            height: 3px;
            background-color: #1B263B;
            transition: 0.3s;
        }
        
        .hamburger.active .hamburger-line:nth-child(1) {
            transform: rotate(45deg) translate(8px, 8px);
        }
        
        .hamburger.active .hamburger-line:nth-child(2) {
            opacity: 0;
        }
        
        .hamburger.active .hamburger-line:nth-child(3) {
            transform: rotate(-45deg) translate(8px, -8px);
        }
        
        /* MOBILE */
        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }
            
            .nav-menu {
                position: fixed;
                top: 70px;
                right: -100%;
                width: 70%;
                max-width: 300px;
                height: calc(100vh - 70px);
                background-color: white;
                flex-direction: column;
                padding: 2rem;
                box-shadow: -5px 0 10px rgba(0,0,0,0.1);
                transition: right 0.3s ease;
                z-index: 999;
            }
            
            .nav-menu.active {
                right: 0;
            }
        }
        
        main {
            margin-top: 100px;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-container">
            <div class="nav-logo">LOGO</div>
            
            <ul class="nav-menu" id="menu">
                <li><a href="#" class="nav-link">Home</a></li>
                <li><a href="#" class="nav-link">About</a></li>
                <li><a href="#" class="nav-link">Contact</a></li>
            </ul>
            
            <button class="hamburger" id="burger">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>
        </div>
    </nav>
    
    <script>
        const burger = document.getElementById('burger');
        const menu = document.getElementById('menu');
        
        burger.onclick = function() {
            burger.classList.toggle('active');
            menu.classList.toggle('active');
            console.log('CLICKED! Menu is now:', menu.classList.contains('active') ? 'OPEN' : 'CLOSED');
        };
        
        console.log('Script loaded. Burger:', burger, 'Menu:', menu);
    </script>
    
    <main>
        <h1>Mobile Menu Test</h1>
        <p>Resize browser to less than 768px width.</p>
        <p>Click the hamburger menu (three lines) in the top right.</p>
        <p>Menu should slide in from right.</p>
        <p>Open F12 Console to see debug messages.</p>
    </main>
</body>
</html>
